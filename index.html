<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower of Hanoi - 3D Game</title>
    <!-- Link to CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🗼 Tower of Hanoi - 3D Learning Game</h1>
        
        <!-- Controls Section -->
        <div class="controls">
            <label for="diskCount">Number of Disks (3-8):</label>
            <input type="range" id="diskCount" min="3" max="8" value="3">
            <span id="countDisplay">3</span>
            
            <button id="resetBtn">Reset Game</button>
            <button id="autoSolveBtn">Auto Solve</button>
            
            <div class="stats">
                <span>Moves: <strong id="moveCounter">0</strong></span>
            </div>
        </div>

        <!-- Game Board -->
        <div class="board">
            <!-- Peg A -->
            <div class="peg" id="pegA" data-peg="A">
                <div class="peg-top"></div>
                <div class="peg-body"></div>
            </div>
            <!-- Peg B -->
            <div class="peg" id="pegB" data-peg="B">
                <div class="peg-top"></div>
                <div class="peg-body"></div>
            </div>
            <!-- Peg C -->
            <div class="peg" id="pegC" data-peg="C">
                <div class="peg-top"></div>
                <div class="peg-body"></div>
            </div>
        </div>

        <!-- Message Box for alerts and victory -->
        <div id="messageBox" class="message-box hidden"></div>
    </div>

    <!-- Link to JavaScript -->
    <script src="script.js"></script>
</body>
</html>
